name: False positive
description: otter flagged a legitimate MCP server incorrectly
labels: [false-positive]
body:
  - type: markdown
    attributes:
      value: |
        Good false-positive reports become clean-corpus samples and directly
        improve otter's accuracy. Thank you.
  - type: input
    id: target
    attributes:
      label: Target
      description: The server you scanned (e.g. `npm:some-server`, `gh:owner/repo`, url).
    validations:
      required: true
  - type: input
    id: finding
    attributes:
      label: Finding ID
      description: The finding you believe is wrong (the `code` shown in the report).
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why this is a false positive
      description: What is the flagged code/description actually doing, and why is it safe?
    validations:
      required: true
  - type: textarea
    id: report
    attributes:
      label: Report excerpt
      description: Paste the relevant finding from the JSON or terminal report.
      render: json
