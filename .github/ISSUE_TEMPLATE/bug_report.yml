name: Bug report
description: Something in otter is broken or behaves unexpectedly
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What did you run, and what went wrong?
      placeholder: |
        Command: npx @nirberko/otter gh:owner/repo
        Expected: ...
        Actual: ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: otter version
      description: Output of `otter --version`
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      description: Output of `node --version`
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Output / logs
      description: Paste the relevant terminal output. Redact secrets.
      render: shell
