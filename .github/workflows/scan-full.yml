name: scan-full

# Re-scan the ENTIRE stored catalog across parallel shards. No discovery —
# shards read the committed data/servers.json (refreshed daily by the discover
# workflow). Runs daily after discover, and on every release so new detection
# rules reach the catalog immediately.

on:
  workflow_run:
    workflows: [release, discover]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: catalog-publish # shared with scan-incremental so they never deploy over each other
  cancel-in-progress: false

env:
  SHARDS: '8'

jobs:
  scan:
    # On workflow_run, only proceed if the release actually succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 6 # polite to npm/registry
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4 # servers.json already committed by discover
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node dist/scan-batch.js --shard ${{ matrix.shard }}/${{ env.SHARDS }} --concurrency 6
      - uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.shard }}
          path: data/results

  merge:
    needs: scan
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/download-artifact@v4
        with:
          pattern: results-*
          merge-multiple: true
          path: data/results
      - run: node dist/summarize.js
      - run: node dist/build-site.js
      - name: Commit full catalog
        run: |
          git config user.name "otter-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --quiet --cached || git commit -m "chore: full catalog rescan [skip ci]"
          git push
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: merge
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
