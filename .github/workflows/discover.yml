name: discover

# Daily registry walk. Its only job is to refresh the stored server list and the
# changed-since-last-run set, and commit them. Scanning + deploy are separate
# workflows that read these committed files — discovery never scans.

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

concurrency:
  group: discover
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node dist/discover.js --full
      - name: Commit discovered servers
        run: |
          git config user.name "otter-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/servers.json data/changed.json
          git diff --quiet --cached || git commit -m "chore: daily discover refresh [skip ci]"
          git push