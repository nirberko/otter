name: classify

# Classify each newly discovered server's officiality once: deterministic
# namespace rules first, a free OpenRouter model for the io.github orgs the
# static vendor table can't decide. Verdicts are committed to
# data/officiality.json and reach summary.json at the next scan-full merge.
# Free-tier daily caps just pause the backfill — the run is resume-safe.

on:
  workflow_run:
    workflows: [discover]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: classify
  cancel-in-progress: false

jobs:
  classify:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node dist/classify-officiality.js
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      - name: Commit verdicts
        run: |
          git config user.name "otter-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/officiality.json
          # pull --rebase: scan-full's merge job may push data/ in the same window.
          git diff --quiet --cached || { git commit -m "chore: officiality verdicts [skip ci]" && git pull --rebase && git push; }
