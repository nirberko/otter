name: scan-incremental

# Daily loop: discover only what the registry marks changed since the last run
# (updated_since), scan those + all url servers (live descriptions can drift
# without a version bump), rebuild the catalog, deploy. Fast — minutes.

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

concurrency:
  group: catalog-publish # shared with scan-full so they never deploy over each other
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

      # No untrusted code execution: npm targets read source, url targets connect as a client.
      - run: node dist/discover.js
      - run: node dist/scan-batch.js --changed-only --concurrency 6
      - run: node dist/summarize.js
      - run: node dist/build-site.js

      - name: Commit refreshed catalog data
        run: |
          git config user.name "mcpscan-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --quiet --cached || git commit -m "chore: incremental catalog refresh [skip ci]"
          git push

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
